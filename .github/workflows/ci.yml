name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build Action
        run: npm run build
      - name: Verify Action
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          llm_provider: nvidia
          nvidia_api_key: ${{ secrets.NVIDIA_API_KEY }}
          nvidia_model: meta/llama-3.3-70b-instruct
