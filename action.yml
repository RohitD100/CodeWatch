name: 'CodeWatch'
description: 'AI-powered pull request review action using configurable LLM providers.'
author: 'Rohit Dorage'
branding:
  icon: 'eye'
  color: 'blue'
inputs:
  github_token:
    description: 'GitHub token for API access'
    required: true
  llm_provider:
    description: 'LLM provider name'
    required: true
    default: 'nvidia'
  nvidia_api_key:
    description: 'NVIDIA API key'
    required: true
  nvidia_model:
    description: 'NVIDIA model'
    required: false
    default: 'meta/llama-3.3-70b-instruct'
runs:
  using: 'node20'
  main: 'dist/index.js'
